# Usar junto al base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Este archivo solo sobreescribe lo que difiere en producción.

services:

  db:
    ports: []    # NO exponer postgres al exterior en producción
    restart: always

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod         # application-prod.yml → csrf habilitado
      JWT_COOKIE_SECURE:      "false"       # cookie Secure obligatoria en HTTPS
    restart: always

  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Certificados SSL — generados con Certbot en la droplet
      # Correr una vez: certbot certonly --standalone -d tudominio.com
      - /etc/letsencrypt/live/${DOMAIN}/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/${DOMAIN}/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: always