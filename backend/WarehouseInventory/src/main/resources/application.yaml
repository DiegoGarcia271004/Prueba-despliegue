spring:
  application:
    name: WarehouseInventory

  profiles:
    active: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    use-big-decimal-for-floats: true

jwt:
  expiration-minutes: 60
  cookie-secure: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

reservation:
  ttl-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    org.example.warehouseinventory: INFO